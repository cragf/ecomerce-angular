<header>
  <div class="header-container">
    <figure>
      <a routerLink="/">
        <img src="assets/img/ui/logo.png" alt="Logo Bucaneer">
      </a>
    </figure>
    <form (submit)="buscar($event)" role="search">
      <input type="search" [(ngModel)]="terminoBusqueda" name="q" placeholder="Buscar productos..." aria-label="Buscar productos">
      <button type="submit">Buscar</button>
    </form>
    <div class="acciones">
      <a routerLink="/carrito" aria-label="Ver carrito">🛒 Carrito <span class="contador">{{ contadorCarrito$ | async }}</span></a>
      <a routerLink="/404" aria-label="Mi cuenta">👤 Mi cuenta</a>
    </div>
  </div>
  <nav>
    <ul>
      <li><a routerLink="/" routerLinkActive="activo">Inicio</a></li>
      <li><a routerLink="/productos" routerLinkActive="activo">Productos</a></li>
      <li><a routerLink="/productos" routerLinkActive="activo">Ofertas</a></li>
      <li><a routerLink="/acerca" routerLinkActive="activo">Blog</a></li>
      <li><a routerLink="/contacto" routerLinkActive="activo">Contacto</a></li>
    </ul>
  </nav>
</header>
